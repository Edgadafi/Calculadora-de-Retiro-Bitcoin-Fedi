<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Brújula v2 — fondo transparente (alias legacy; mismo ícono que logo-fedi-icon.svg) -->

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#F07D38" stroke-width="6"/>

  <!-- Cardinal marks -->
  <g stroke="#F07D38" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="92" x2="256" y2="108"/>
    <line x1="256" y1="404" x2="256" y2="420"/>
    <line x1="92" y1="256" x2="108" y2="256"/>
    <line x1="404" y1="256" x2="420" y2="256"/>
  </g>

  <!-- North label -->
  <text x="256" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#F07D38">N</text>

  <!-- South needle -->
  <path d="M256 168 L228 320 L256 300 L284 320 Z" fill="#4A5568"/>

  <!-- North needle -->
  <path d="M256 320 L228 168 L256 188 L284 168 Z" fill="#F07D38"/>

  <!-- Center: Bitcoin symbol -->
  <circle cx="256" cy="256" r="36" fill="#F07D38"/>
  <text x="256" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="38" fill="#1E2B58">&#x20bf;</text>
</svg>
